service: taskvault-backend
frameworkVersion: "3"

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:AWS_REGION, "us-east-2"}
  stage: ${opt:stage, "dev"}
  memorySize: 512
  timeout: 30
  httpApi:
    cors: true
  environment:
    MISSIONS_TABLE: ${self:service}-${self:provider.stage}-missions
    ACTIVITY_TABLE: ${self:service}-${self:provider.stage}-activity
    REPORTS_TABLE: ${self:service}-${self:provider.stage}-reports
    AGENT_TABLE: ${self:service}-${self:provider.stage}-agent
    ESCROW_CONTRACT_ADDRESS: ${env:ESCROW_CONTRACT_ADDRESS}
    USDC_ADDRESS: ${env:USDC_ADDRESS, "0x036CbD53842c5426634e7929541eC2318f3dCF7e"}
    BASE_SEPOLIA_RPC: ${env:BASE_SEPOLIA_RPC, "https://sepolia.base.org"}
    X402_API_URL: ${env:X402_API_URL}
    BEDROCK_MODEL_ID: ${env:BEDROCK_MODEL_ID}
    CDP_API_KEY_ID: ${env:CDP_API_KEY_ID}
    CDP_API_KEY_SECRET: ${env:CDP_API_KEY_SECRET}
    CDP_WALLET_SECRET: ${env:CDP_WALLET_SECRET}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt MissionsTable.Arn
            - !Sub "${MissionsTable.Arn}/index/*"
            - !GetAtt ActivityTable.Arn
            - !GetAtt ReportsTable.Arn
            - !GetAtt AgentTable.Arn
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:InvokeModelWithResponseStream
          Resource: "*"
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${self:service}-${self:provider.stage}-agentCron"

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    exclude:
      - "@aws-sdk/*"

functions:
  # ---------- Missions API (matches frontend) ----------
  createMission:
    handler: src/handlers/missions.create
    events:
      - httpApi:
          path: /api/missions
          method: POST
  listMissions:
    handler: src/handlers/missions.list
    events:
      - httpApi:
          path: /api/missions
          method: GET
  getMission:
    handler: src/handlers/missions.get
    events:
      - httpApi:
          path: /api/missions/{id}
          method: GET
  deleteMission:
    handler: src/handlers/missions.remove
    events:
      - httpApi:
          path: /api/missions/{id}
          method: DELETE

  # ---------- Agent API (matches frontend) ----------
  agentSnapshot:
    handler: src/handlers/agent.snapshot
    events:
      - httpApi:
          path: /api/agent/snapshot
          method: GET
  agentScan:
    handler: src/handlers/agent.scan
    timeout: 300
    events:
      - httpApi:
          path: /api/agent/scan
          method: POST

  # ---------- Agent cron (same logic as POST /api/agent/scan) ----------
  agentCron:
    handler: src/handlers/agent.cron
    timeout: 300
    events:
      - schedule:
          rate: rate(1 minute)
          enabled: ${env:AGENT_CRON_ENABLED, "false"}

resources:
  Resources:
    MissionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MISSIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: status
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: status-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    ActivityTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.ACTIVITY_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: missionId
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: N
        KeySchema:
          - AttributeName: missionId
            KeyType: HASH
          - AttributeName: timestamp
            KeyType: RANGE

    ReportsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.REPORTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: missionId
            AttributeType: S
        KeySchema:
          - AttributeName: missionId
            KeyType: HASH

    AgentTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.AGENT_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
